<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Arial, sans-serif; font-size: 18px; fill: #4b5563; }
      .section { font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
      .label { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #374151; }
      .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; }
      .client { fill: #eff6ff; stroke: #2563eb; }
      .server { fill: #ecfdf5; stroke: #059669; }
      .data { fill: #fefce8; stroke: #ca8a04; }
      .external { fill: #fff7ed; stroke: #ea580c; }
      .module { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.6; rx: 10; }
      .line { stroke: #1f2937; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7280; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="58" text-anchor="middle" class="title">Arsitektur Sistem Web CertiGuardia</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">Pemisahan client, server aplikasi, basis data terpusat, dan layanan eksternal</text>

  <rect x="70" y="145" width="300" height="590" class="box client"/>
  <text x="220" y="185" text-anchor="middle" class="section">Client</text>
  <text x="220" y="213" text-anchor="middle" class="small">Browser pengguna</text>

  <rect x="105" y="265" width="230" height="110" class="module"/>
  <text x="220" y="306" text-anchor="middle" class="label">Peserta</text>
  <text x="220" y="334" text-anchor="middle" class="small">Akses katalog, daftar</text>
  <text x="220" y="356" text-anchor="middle" class="small">pelatihan, bayar, sertifikat</text>

  <rect x="105" y="455" width="230" height="110" class="module"/>
  <text x="220" y="496" text-anchor="middle" class="label">Admin / Pemateri</text>
  <text x="220" y="524" text-anchor="middle" class="small">Kelola pelatihan, peserta,</text>
  <text x="220" y="546" text-anchor="middle" class="small">materi, laporan, sertifikat</text>

  <rect x="520" y="145" width="430" height="590" class="box server"/>
  <text x="735" y="185" text-anchor="middle" class="section">Server Aplikasi Web</text>
  <text x="735" y="213" text-anchor="middle" class="small">Next.js di server hosting</text>

  <rect x="560" y="255" width="350" height="82" class="module"/>
  <text x="735" y="287" text-anchor="middle" class="label">UI dan Routing Web</text>
  <text x="735" y="314" text-anchor="middle" class="small">Halaman peserta, admin, pemateri, publik</text>

  <rect x="560" y="365" width="350" height="82" class="module"/>
  <text x="735" y="397" text-anchor="middle" class="label">Server Actions</text>
  <text x="735" y="424" text-anchor="middle" class="small">Login, registrasi, CRUD data pelatihan</text>

  <rect x="560" y="475" width="350" height="82" class="module"/>
  <text x="735" y="507" text-anchor="middle" class="label">API Routes</text>
  <text x="735" y="534" text-anchor="middle" class="small">Checkout Midtrans dan webhook notifikasi</text>

  <rect x="560" y="585" width="350" height="82" class="module"/>
  <text x="735" y="617" text-anchor="middle" class="label">Modul Sertifikat dan Laporan</text>
  <text x="735" y="644" text-anchor="middle" class="small">Penerbitan sertifikat digital dan rekap data</text>

  <rect x="1090" y="145" width="350" height="590" class="box data"/>
  <text x="1265" y="185" text-anchor="middle" class="section">Supabase Cloud</text>
  <text x="1265" y="213" text-anchor="middle" class="small">Backend service terpusat</text>

  <rect x="1130" y="275" width="270" height="92" class="module"/>
  <text x="1265" y="309" text-anchor="middle" class="label">Authentication</text>
  <text x="1265" y="337" text-anchor="middle" class="small">Session dan role pengguna</text>

  <rect x="1130" y="410" width="270" height="105" class="module"/>
  <text x="1265" y="446" text-anchor="middle" class="label">PostgreSQL Database</text>
  <text x="1265" y="474" text-anchor="middle" class="small">profil_pengguna, kursus,</text>
  <text x="1265" y="496" text-anchor="middle" class="small">pendaftaran, pembayaran, sertifikat</text>

  <rect x="1130" y="560" width="270" height="82" class="module"/>
  <text x="1265" y="592" text-anchor="middle" class="label">Admin Client</text>
  <text x="1265" y="619" text-anchor="middle" class="small">Akses server-side untuk webhook</text>

  <rect x="555" y="790" width="360" height="70" class="box external"/>
  <text x="735" y="819" text-anchor="middle" class="label">Midtrans Payment Gateway</text>
  <text x="735" y="845" text-anchor="middle" class="small">Snap API, halaman pembayaran, notifikasi transaksi</text>

  <path class="line" d="M370 320 C430 320, 455 300, 520 300"/>
  <text x="445" y="292" text-anchor="middle" class="tiny">HTTPS request</text>

  <path class="line" d="M370 510 C430 510, 455 410, 520 410"/>
  <text x="445" y="432" text-anchor="middle" class="tiny">HTTPS request</text>

  <path class="line" d="M950 318 C1015 318, 1030 318, 1090 318"/>
  <text x="1020" y="300" text-anchor="middle" class="tiny">validasi session</text>

  <path class="line" d="M950 455 C1015 455, 1030 455, 1090 455"/>
  <text x="1020" y="437" text-anchor="middle" class="tiny">query / mutation data</text>

  <path class="line" d="M950 625 C1015 625, 1030 498, 1090 498"/>
  <text x="1024" y="585" text-anchor="middle" class="tiny">simpan sertifikat/laporan</text>

  <path class="line" d="M735 735 L735 790"/>
  <text x="820" y="765" text-anchor="middle" class="tiny">buat Snap token</text>

  <path class="dash" d="M915 825 C1060 825, 1065 545, 950 520"/>
  <text x="1027" y="730" text-anchor="middle" class="tiny">webhook status pembayaran</text>

  <path class="dash" d="M555 825 C390 825, 270 650, 230 565"/>
  <text x="390" y="754" text-anchor="middle" class="tiny">redirect/halaman bayar</text>

  <rect x="70" y="770" width="420" height="82" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" rx="12"/>
  <text x="92" y="798" class="label">Catatan Data Kemnaker</text>
  <text x="92" y="825" class="small">Data Kemnaker bukan komponen sistem eksternal.</text>
  <text x="92" y="847" class="small">Data dimasukkan manual oleh admin melalui aplikasi web.</text>

  <rect x="1035" y="770" width="440" height="82" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" rx="12"/>
  <text x="1057" y="798" class="label">Batas Sistem</text>
  <text x="1057" y="825" class="small">Client tidak menyimpan database utama.</text>
  <text x="1057" y="847" class="small">Data terpusat di Supabase dan diakses melalui server aplikasi.</text>
</svg>
